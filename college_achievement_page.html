<!--
    @EVENT: INNOVATE-X
    @PROJECT: COLLEGE SAATHI
    @AUTHOR: COLLEGE SAAHTI X TEAM
    @DATE: 01-04-2026
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Saathi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@300;400;600&display=swap">
<style>
	:root { --gold: #F5C200; --black: #1a1a1a; --white: #FFFFFF; --red-accent: #CC2244; --text-body: #222222; --border: #E5E5E5; --sk-base: #e8e8e8; --sk-shine: #f5f5f5; --sk-radius: 3px; --sk-speed: 1.4s; }
	*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
	html, body { width: 100%; height: 100%; font-family: 'Source Serif 4', Georgia, serif; background: var(--white); color: var(--text-body); line-height: 1.6; }
	.page-wrapper { display: flex; flex-direction: column; min-height: 100vh; width: 100%; }
	.detail-topbar { background: var(--gold); padding: 0 clamp(14px, 2vw, 28px); height: 38px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; flex-shrink: 0; }
	.detail-topbar-title { font-family: 'Playfair Display', serif; font-size: clamp(14px, 1.6vw, 20px); font-weight: 700; color: var(--black); letter-spacing: 0.04em; }
	.detail-body { flex: 1; width: 100%; }
	.detail-content { width: 65%; margin: 0 auto; padding: clamp(16px, 2vw, 32px) 0 clamp(16px, 2vh, 28px); display: flex; flex-direction: column; }
	@media (max-width: 700px) { .detail-content { width: 92%; } }
	.detail-hero { width: 100%; height: clamp(160px, 26vh, 320px); margin-bottom: clamp(14px, 2vh, 24px); border-radius: 3px; flex-shrink: 0; overflow: hidden; background: #f0f0f0; position: relative; }
	.detail-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
	.detail-hero-fallback { width: 100%; height: 100%; background: linear-gradient(135deg,#888 0%,#666 100%); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); font-size: clamp(32px, 5vw, 64px); }
	.detail-title { font-family: 'Playfair Display', serif; font-size: clamp(18px, 2.4vw, 30px); font-weight: 900; color: var(--black); margin-bottom: 6px; line-height: 1.25; }
	.detail-meta { font-size: clamp(11px, 1vw, 13px); color: #777; letter-spacing: 0.04em; padding-bottom: 10px; margin-bottom: 14px; border-bottom: 2px solid var(--gold); }
	.detail-text { font-size: clamp(12px, 1.1vw, 15px); line-height: 1.85; color: var(--text-body); margin-bottom: clamp(18px, 2.5vh, 28px); white-space: pre-line; }
	.detail-section-label { font-size: clamp(11px, 1vw, 13px); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
	.detail-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
	.detail-images { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(8px, 1.2vw, 16px); width: 100%; margin-bottom: 30px; }
	.detail-img-card { aspect-ratio: 16/9; border-radius: 3px; overflow: hidden; background: #eee; cursor: pointer; position: relative; }
	.detail-img-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s ease; }
	.detail-img-card:hover img { transform: scale(1.06); }
	.detail-nav-wrap { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-top: 1px solid var(--border); margin-top: auto; }
	.page-btn { min-width: 80px; height: 32px; padding: 0 15px; border: 1.5px solid var(--border); background: transparent; color: var(--text-body); font-family: 'Source Serif 4', serif; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 3px; transition: all 0.18s; display: flex; align-items: center; justify-content: center; text-decoration: none; }
	.page-btn:hover { border-color: var(--gold); background: #fffbea; }
	.page-btn:active { background: var(--gold); border-color: var(--gold); color: var(--black); }
	.page-btn.hidden { visibility: hidden; pointer-events: none; }
	.footer-bar { background: #2a2a2a; display: flex; justify-content: space-between; align-items: center; padding: clamp(10px,1.2vw,14px) clamp(20px,5vw,60px); font-size: clamp(10px,0.95vw,12.5px); color: #888; flex-wrap: wrap; gap: 8px; flex-shrink: 0; }
	.footer-credit { display: flex; align-items: center; gap: 5px; color: #999; }
	.footer-heart { color: var(--red-accent); font-size: 14px; animation: heartbeat 1.6s ease-in-out infinite; }
	@keyframes heartbeat { 0%, 100% { transform: scale(1); } 14% { transform: scale(1.25); } 28% { transform: scale(1); } 42% { transform: scale(1.15); } 56% { transform: scale(1); } }
	@media (max-width: 560px) { .footer-bar { flex-direction: column; text-align: center; } }
	.lightbox { display: none; position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
	.lightbox.open { display: flex; }
	.lightbox img { max-width: 92vw; max-height: 90vh; object-fit: contain; border-radius: 4px; box-shadow: 0 8px 48px rgba(0,0,0,0.7); pointer-events: none; }
	.lightbox-close { position: absolute; top: 18px; right: 24px; color: white; font-size: 36px; cursor: pointer; line-height: 1; opacity: 0.75; transition: opacity 0.2s; }
	@keyframes shimmer { 0% { background-position: -600px 0; } 100% { background-position: 600px 0; } }
	.sk { background: linear-gradient(90deg, var(--sk-base) 25%, var(--sk-shine) 50%, var(--sk-base) 75%); background-size: 600px 100%; animation: shimmer var(--sk-speed) infinite linear; border-radius: var(--sk-radius); display: block; }
	.sk-text { height: 14px; width: 100%; margin-bottom: 10px; }
	.sk-title { height: 32px; width: 70%; margin-bottom: 15px; }
</style>
</head>
<body>
<div class="page-wrapper">
	<div class="detail-topbar">
		<span class="detail-topbar-title">ACHIEVEMENTS</span>
	</div>
	<div class="detail-body">
		<div class="detail-content" id="skContainer">
			<div class="sk detail-hero"></div>
			<div class="sk sk-title"></div>
			<div class="sk sk-text" style="width: 40%;"></div>
			<div class="sk sk-text"></div>
			<div class="sk sk-text"></div>
			<div class="sk sk-text" style="width: 80%;"></div>
		</div>
		<div class="detail-content" id="realContainer" style="display: none;">
			<div class="detail-hero" id="detailHero">
				<div class="detail-hero-fallback" id="detailHeroFallback"></div>
			</div>
			<h2 class="detail-title" id="detailTitle"></h2>
			<div class="detail-meta" id="detailMeta"></div>
			<div class="detail-text" id="detailText"></div>
			<div class="detail-section-label" id="galleryLabel">Gallery</div>
			<div class="detail-images" id="detailGallery"></div>
			<div class="detail-nav-wrap">
				<a href="#" class="page-btn" id="btnPrev">‹ Previous</a>
				<a href="#" class="page-btn" id="btnNext">Next ›</a>
			</div>
		</div>
	</div>
	<footer class="footer-bar">
		<span>&copy; 2026 College Saathi. All Rights Reserved.</span>
		<span class="footer-credit">Made with <span class="footer-heart">&#9829;</span> By Aditya Shankar</span>
	</footer>
</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
	<span class="lightbox-close">✕</span>
	<img id="lightboxImg" src="" alt="Full view">
</div>
<script>
const META_RAW_URL = "https://raw.githubusercontent.com/InnovateX26/COLLEGE_SAATHI_x_TEAM/refs/heads/main/g_meta_data.json";
const GITHUB_RAW_BASE = "https://raw.githubusercontent.com/InnovateX26/COLLEGE_SAATHI_x_TEAM/main/";
const params = new URLSearchParams(window.location.search);
const COLLEGE_INDEX = parseInt(params.get('college'), 10) || 0;
let ACHIEVE_ID = parseInt(params.get('id'), 10);
async function loadDetail() {
	try {
		const metaRes = await fetch(META_RAW_URL + '?t=' + Date.now());
		const metaJson = await metaRes.json();
		const college = metaJson.colleges[COLLEGE_INDEX];
		const idKey = `id${COLLEGE_INDEX + 1}`;
		const dataRes = await fetch(`${GITHUB_RAW_BASE}${idKey}/${college.files.achievements}?t=${Date.now()}`);
		const dataJson = await dataRes.json();
		const achievements = [...dataJson.achievements].reverse();
		const a = achievements[ACHIEVE_ID];
		if (!a) throw new Error("Achievement not found");
		document.getElementById('detailTitle').textContent = a.title;
		document.getElementById('detailMeta').textContent = `${a.category}`; //`${a.category || 'Achievement'} · ${a.date || ''}`;
		document.getElementById('detailText').textContent = a.full || a.short;
		if (a.img) {
			document.getElementById('detailHero').innerHTML = `<img src="${a.img}" alt="Hero">`;
		} else {
			document.getElementById('detailHeroFallback').style.display = 'flex';
		}
		const galleryEl = document.getElementById('detailGallery');
		if (a.gallery && a.gallery.length) {
			galleryEl.innerHTML = a.gallery.map(src => `
				<div class="detail-img-card" onclick="openLightbox('${src}')">
					<img src="${src}" loading="lazy">
				</div>`).join('');
			document.getElementById('galleryLabel').style.display = 'flex';
		} else {
			galleryEl.style.display = 'none';
			document.getElementById('galleryLabel').style.display = 'none';
		}
		const prevBtn = document.getElementById('btnPrev');
		const nextBtn = document.getElementById('btnNext');
		if (ACHIEVE_ID > 0) {
			prevBtn.classList.remove('hidden');
			prevBtn.href = `?college=${COLLEGE_INDEX}&id=${ACHIEVE_ID - 1}`;
		} else {
			prevBtn.classList.add('hidden');
		}
		if (ACHIEVE_ID < achievements.length - 1) {
			nextBtn.classList.remove('hidden');
			nextBtn.href = `?college=${COLLEGE_INDEX}&id=${ACHIEVE_ID + 1}`;
		} else {
			nextBtn.classList.add('hidden');
		}
		setTimeout(() => {
			document.getElementById('skContainer').style.display = 'none';
			document.getElementById('realContainer').style.display = 'flex';
		}, 600);
	} catch (err) {
		document.getElementById('skContainer').innerHTML = `<p style="color:red; text-align:center; padding: 50px;">${err.message}</p>`;
	}
}
function openLightbox(src) {
	document.getElementById('lightboxImg').src = src;
	document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
	document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
loadDetail();
</script>
</body>
</html>
