<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Saathi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@300;400;600&display=swap">
<style>
	:root { --gold: #F5C200; --black: #1a1a1a; --white: #FFFFFF; --red-accent: #CC2244; --text-body: #222222; --border: #E5E5E5; }
	*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
	html, body { width: 100%; height: 100vh; font-family: 'Source Serif 4', Georgia, serif; background: #e8e8e8; color: var(--text-body); overflow: hidden; }
	.page-wrapper { width: 100vw; height: 100vh; display: flex; flex-direction: column; background: var(--white); box-shadow: 0 0 60px rgba(0,0,0,0.22); position: relative; }
	.login-topbar { background: var(--gold); padding: 0 clamp(16px, 2.5vw, 32px); height: 38px; display: flex; align-items: center; flex-shrink: 0; gap: 14px; }
	.login-topbar-title { font-family: 'Playfair Display', serif; font-size: clamp(14px, 1.6vw, 20px); font-weight: 700; color: var(--black); letter-spacing: 0.04em; }
	.login-body { flex: 1; overflow-y: auto; padding: clamp(28px, 4vw, 52px) clamp(20px, 5vw, 60px) 40px; position: relative; }
	.login-cred-label { font-family: 'Source Serif 4', serif; font-size: clamp(14px, 1.4vw, 18px); font-weight: 600; color: var(--text-body); margin-bottom: 8px; }
	.login-cred-line { height: 2px; background: var(--gold); margin-bottom: clamp(18px, 2.5vh, 30px); max-width: 780px; }
	.login-note { max-width: 780px; margin-bottom: 18px; font-size: clamp(11px, 1vw, 13px); color: #777; line-height: 1.65; background: #fffdf0; border-left: 3px solid var(--gold); padding: 10px 14px; }
	.login-field-row { display: flex; align-items: stretch; max-width: 780px; margin-bottom: 14px; border: 2px solid var(--black); }
	.login-field-label { background: #f9f9f9; border-right: 2px solid var(--black); padding: 12px 18px; font-family: 'Source Serif 4', serif; font-size: clamp(12px, 1.1vw, 14px); font-weight: 600; color: var(--black); min-width: 130px; }
	.login-field-input { flex: 1; padding: 12px 16px; font-family: 'Source Serif 4', serif; font-size: clamp(12px, 1.1vw, 14px); border: none; outline: none; }
	.login-proceed-btn { background: var(--gold); border: 2px solid #c8a000; color: var(--black); font-family: 'Source Serif 4', serif; font-size: clamp(13px, 1.2vw, 16px); font-weight: 700; padding: 10px 60px; cursor: pointer; transition: background 0.2s; }
	.login-status-line { padding: 4px; font-size: 13.5px; font-weight: 600; }
	.login-status-line.err { color: var(--red-accent); }
	.footer-bar { background: #2a2a2a; display: flex; justify-content: space-between; align-items: center; padding: clamp(10px,1.2vw,14px) clamp(20px,5vw,60px); font-size: clamp(10px,0.95vw,12.5px); color: #888; flex-wrap: wrap; gap: 8px; }
	.footer-credit { display: flex; align-items: center; gap: 5px; color: #999; }
	.footer-heart { color: var(--red-accent); font-size: 14px; animation: heartbeat 1.6s ease-in-out infinite; }
	@keyframes heartbeat { 0%, 100% { transform: scale(1); } 14% { transform: scale(1.25); } 28% { transform: scale(1); } 42% { transform: scale(1.15); } 56% { transform: scale(1); } }
	@media (max-width: 560px) { .footer-bar { flex-direction: column; text-align: center; } }
</style>
</head>
<body>
<div class="page-wrapper">
	<div class="login-topbar"><span class="login-topbar-title">LOGIN PAGE</span></div>
	<div class="login-body">
		<div class="login-cred-label">Your Credentials:</div>
		<div class="login-cred-line"></div>
		<!--<div class="login-note"><strong>Note:</strong> Unique_ID is provided by College Admin.</div>-->
		<div class="login-field-row">
			<span class="login-field-label">Unique_ID:</span>
			<input class="login-field-input" type="text" id="loginUID" placeholder="Enter your Unique ID">
		</div>
		<div class="login-field-row">
			<span class="login-field-label">Password:</span>
			<input class="login-field-input" type="password" id="loginPwd" placeholder="Enter password">
		</div>
		<div style="max-width: 780px; display: flex; flex-direction: column; align-items: center; margin-top: 20px; gap: 20px;">
			<button class="login-proceed-btn" onclick="doLogin()">Proceed</button>
			<div style="font-size: 14px;">
				<a id="regLink" href="college_login_registration_page.html" style="color: var(--black); font-weight: 600; text-decoration: underline;">Haven't registered yet? Register here</a>
			</div>
		</div>
		<div id="loginStatusWrap" style="display:none; margin-top: 20px;">
			<div id="loginStatusLines"></div>
		</div>
	</div>
	<footer>
		<div class="footer-bar">
			<span>&copy; 2026 College Saathi. All Rights Reserved.</span>
			<span class="footer-credit">Made with <span class="footer-heart">&#9829;</span> By Aditya Shankar</span>
		</div>
	</footer>
</div>
<script>
const GITHUB_TOKEN = "__API__";
const META_RAW_URL = "https://raw.githubusercontent.com/InnovateX26/COLLEGE_SAATHI_x_TEAM/refs/heads/main/g_meta_data.json";
const GITHUB_BASE = "https://api.github.com/repos/InnovateX26/COLLEGE_SAATHI_x_TEAM/contents/";
const COLLEGE_INDEX = (() => {
	const v = parseInt(new URLSearchParams(window.location.search).get('college'), 10);
	return isNaN(v) ? 0 : v;
})();
window.onload = () => {
	const regLink = document.getElementById('regLink');
	regLink.href = `college_login_registration_page.html?college=${COLLEGE_INDEX}`;
};
function handleProfileBtn() {
    const college = new URLSearchParams(window.location.search).get('college') || '0';
    const sessionStr = sessionStorage.getItem('cs_session');
    if (!sessionStr) {
        window.location.href = 'college_login_page.html?college=' + college;
        return;
    }
    const session = JSON.parse(sessionStr);
    const uid = (session.uid || '').toLowerCase();
    if (uid.startsWith('admin')) {
        window.location.href = 'college_admin_panel.html?college=' + college;
    } else if (uid.startsWith('other')) {
        window.location.href = 'college_other_panel.html?college=' + college;
    } else {
        window.location.href = 'college_student_panel.html?college=' + college;
    }
}
async function getMetaData() {
	const res = await fetch(META_RAW_URL + '?t=' + Date.now());
	return await res.json();
}
async function doLogin() {
	const uidInput = document.getElementById('loginUID').value.trim();
	const pwdInput = document.getElementById('loginPwd').value;
	const lns = document.getElementById('loginStatusLines');
	const wrap = document.getElementById('loginStatusWrap');
	if(!uidInput || !pwdInput) { 
		wrap.style.display='block'; 
		lns.innerHTML='<div class="login-status-line err">Enter credentials!</div>'; 
		return; 
	}
	wrap.style.display = 'block';
	lns.innerHTML = '<div class="login-status-line">Verifying...</div>';
	try {
		const meta = await getMetaData();
		const college = meta.colleges[COLLEGE_INDEX];
		if (college && uidInput === college.adminId && pwdInput === college.adminPwd) {
			sessionStorage.setItem('cs_session', JSON.stringify({uid: uidInput, name:"Admin", isAdmin:true}));
			handleProfileBtn();
			return;
		}
		const path = `id${COLLEGE_INDEX + 1}/${college.files.user}`;
		const res = await fetch(GITHUB_BASE + encodeURIComponent(path), { 
			headers: { Authorization: `Bearer ${GITHUB_TOKEN}` }
		});
		const data = await res.json();
		const users = JSON.parse(atob(data.content)).users;
		const found = users.find(u => u.uid === uidInput && u.pwd === pwdInput);
		if (found) {
			sessionStorage.setItem('cs_session', JSON.stringify(found));
			handleProfileBtn();
		} else {
			lns.innerHTML = '<div class="login-status-line err">Invalid ID or Password!</div>';
		}
	} catch (e) {
		lns.innerHTML = '<div class="login-status-line err">Error: ' + e.message + '</div>';
	}
}
</script>
</body>
</html>
