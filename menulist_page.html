<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Saathi</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /*TODO*/
    </style>
</head>
<body>
    <div class="page-wrapper">
    	<div class="header-band">
    		<div class="cs-title">
                College Saathi
            </div>
    		<div class="cs-subtitle">
                — Digital Multi College Ecosystem —
            </div>
    		<div class="cs-version" id="sysVersion">
                version: v1.0
            </div>
    	</div>
    	<div class="main-content">
    		<div class="qualities-title">
                ALL COLLEGES:
            </div>
    		<div class="qualities-gold-line"></div>
    		<div class="search-row">
    			<div class="search-icon-wrap">
                    <!-- src: chatgpt -->
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    					<circle cx="11" cy="11" r="8"/>
    					<line x1="21" y1="21" x2="16.65" y2="16.65"/>
    				</svg>
    			</div>
    			<input class="search-input" type="text" id="searchInput" placeholder="Search colleges..." oninput="onSearch(this.value)" autocomplete="off">
    			<button class="search-clear" onclick="clearSearch()" title="Clear">
                    &#x2715;
                </button>
    		</div>
    		<div class="colleges-grid" id="collegesGrid"></div>
    	</div>
    	<footer>
    		<div class="footer-bar">
    			<span>
                    &copy; 2026 College Saathi. All Rights Reserved.
                </span>
    			<span class="footer-credit">
                    Made with <span class="footer-heart">&#9829;</span>By Aditya Shankar
                </span>
    		</div>
    	</footer>
    </div>
    <script>
        const m_github = "https://raw.githubusercontent.com/AdityaShankar990/GECJ_HACKATHON/refs/heads/main/g_meta_data.json";
        let allColleges = [];
        function buildSkeletons() {
        	const grid = document.getElementById('collegesGrid');
        	if (!grid) return;
        	const gridW = grid.offsetWidth || window.innerWidth - 80;
        	const gap = Math.max(10, window.innerWidth * 0.015);
        	const minCard = Math.max(160, Math.min(260, window.innerWidth * 0.20));
        	const cols = Math.max(2, Math.floor((gridW + gap) / (minCard + gap)));
        	const topBar = document.querySelector('.top-bar');
        	const headerH = topBar ? topBar.offsetHeight : 38;
        	const footerH = 44;
        	const overheadH = clamp(14, 2, 28, true) + 15 + 3 + clamp(14, 2, 22, true) + 42 + clamp(14, 2, 22, true);
        	const availH = window.innerHeight - headerH - footerH - overheadH;
        	const cardH = (gridW / cols) * (9 / 16) + 50;
        	const rows = Math.max(2, Math.ceil(availH / (cardH + gap)));
        	const count = cols * rows;
        	grid.innerHTML = Array.from({ length: count }, () => `
        		<div class="skeleton-card">
        			<div class="skeleton-img"></div>
        			<div class="skeleton-body">
        				<div class="skeleton-line"></div>
        				<div class="skeleton-line short"></div>
        			</div>
        		</div>`).join('');
        }
        function clamp(min, vw, max, ret) {
        	const v = (window.innerWidth * vw) / 100;
        	return Math.min(max, Math.max(min, v));
        }
        async function loadData() {
        	buildSkeletons();
        	const controller = new AbortController();
        	const timer = setTimeout(() => controller.abort(), 8000);
        	try {
        		const res = await fetch(m_github + "?t=" + Date.now(), {
        			signal: controller.signal,
        			cache: 'no-store'
        		});
        		clearTimeout(timer);
        		if (!res.ok) {
        			throw new Error("HTTP " + res.status);
        		}
        		const data = await res.json();
        		applyData(data);
        	} catch (err) {
        		const msg = err.name === 'AbortError' ? 'Request timed out.' : err.message;
        		showError(msg);
        	}
        }
        function applyData(data) {
        	allColleges = data.colleges || [];
        	const v = data.meta?.version || "v1.0";
        	const versionEl = document.getElementById('sysVersion');
        	if (versionEl) {
        		versionEl.textContent = 'version: ' + v;
        	}
        	renderGrid(allColleges);
        }
        function renderGrid(colleges) {
        	const grid = document.getElementById('collegesGrid');
        	if (!grid) return;
        	const searchInput = document.getElementById('searchInput');
        	const isSearching = searchInput && searchInput.value.trim().length > 0;
        	const registerHTML = `
        		<div class="college-card register-card" onclick="window.location.href='3__register_new_college.html'">
        			<div class="register-plus">+</div>
        			<div class="register-label">Register New College!!!</div>
        		</div>`;
        	if (!colleges.length) {
        		grid.innerHTML = `
        			${isSearching ? '<div class="no-results">No results found.</div>' : ''}
        			${registerHTML}`;
        		return;
        	}
        	let html = colleges.map(c => {
        		const imgHTML = c.image
        			? `<img src="${esc(c.image)}" alt="${esc(c.name)}" loading="lazy" 
        				 onerror="this.outerHTML='<div class=\\'college-card-placeholder\\'></div>'">`
        			: `<div class="college-card-placeholder"></div>`;
        		return `
        			<div class="college-card" onclick="openCollege(${allColleges.indexOf(c)})">
        				<div class="college-card-img-wrap">${imgHTML}</div>
        				<div class="college-card-body">
        					<div class="college-card-name">${esc(c.name)}</div>
        					<div class="college-card-tag">Click me to view</div>
        				</div>
        			</div>`;
        	}).join('');
        	grid.innerHTML = html + registerHTML;
        }
        function showError(msg) {
        	const grid = document.getElementById('collegesGrid');
        	if (grid) {
        		grid.innerHTML = `
        			<div class="fetch-error">
        				 Failed to load colleges.<br><small>${esc(msg)}</small><br>
        				 <button class="retry-btn" onclick="location.reload()">Retry</button>
        			</div>`;
        	}
        }
        function onSearch(val) { 
        	filterColleges(val); 
        }
        function filterColleges(q) {
        	const t = q.trim().toLowerCase();
        	const filtered = t ? allColleges.filter(c => c.name.toLowerCase().includes(t)) : allColleges;
        	renderGrid(filtered);
        }
        function clearSearch() {
        	const inp = document.getElementById('searchInput');
        	if (inp) {
        		inp.value = ''; 
        		inp.focus(); 
        		filterColleges('');
        	}
        }
        function openCollege(index) {
        	window.location.href = '4__college_profile.html?college=' + index;
        }
        function esc(s) {
        	if (!s) return '';
        	return String(s)
        		.replace(/&/g, '&amp;')
        		.replace(/"/g, '&quot;')
        		.replace(/</g, '&lt;')
        		.replace(/>/g, '&gt;')
        		.replace(/'/g, '&#39;');
        }
        window.addEventListener('DOMContentLoaded', loadData);
        let _resizeTimer;
        window.addEventListener('resize', () => {
        	clearTimeout(_resizeTimer);
        	_resizeTimer = setTimeout(() => {
        		if (document.querySelector('.skeleton-card')) {
        			buildSkeletons();
        		}
        	}, 220);
        });
    </script>
</body>
</html>
